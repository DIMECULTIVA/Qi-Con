<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qi-Con | Civil & Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; overflow-x: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 0; pointer-events: none; }
        #cookie-banner { display: none; }
    </style>
</head>
<body class="relative min-h-screen">

    <div id="canvas-container"></div>
    <div class="overlay"></div>

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-6 bg-black/50 backdrop-blur-md border-b border-gray-800">
        <a href="index.html" class="text-4xl font-bold tracking-tighter">Q</a>
        <div class="flex gap-6 font-semibold hidden md:flex">
            <a href="index.html" class="hover:text-blue-400 transition-colors">Home</a>
            <a href="portfolio.html" class="hover:text-blue-400 transition-colors">Portfolio</a>
            <a href="blog.html" class="hover:text-blue-400 transition-colors">Blog (GEO)</a>
            <a href="contact.html" class="hover:text-blue-400 transition-colors">Contact</a>
        </div>
    </nav>

    <main class="relative z-10 flex flex-col items-center justify-center min-h-screen text-center px-6">
        <h1 class="text-7xl md:text-9xl font-extrabold tracking-tighter mb-6">QI-CON</h1>
        <h2 class="text-2xl md:text-3xl font-light text-gray-300 max-w-3xl">
            Outstanding Achievement in Residential and Commercial Buildings.
        </h2>
    </main>

    <a href="https://wa.me/27761546487" target="_blank" class="fixed bottom-6 right-6 z-50 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
    </a>

    <div id="cookie-banner" class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-700 p-4 z-50 flex flex-col md:flex-row justify-between items-center gap-4">
        <p class="text-sm text-gray-300">We use cookies to enhance your browsing experience and analyze site traffic.</p>
        <button onclick="acceptCookies()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded font-bold text-sm">Accept All</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Cookie Logic
        if (!localStorage.getItem('QiConCookies')) {
            document.getElementById('cookie-banner').style.display = 'flex';
        }
        function acceptCookies() {
            localStorage.setItem('QiConCookies', 'true');
            document.getElementById('cookie-banner').style.display = 'none';
            // Init Google Analytics here
        }

        // 3D Background Logic
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const textureLoader = new THREE.TextureLoader();
        // Load the skyline image
        textureLoader.load('Skyline1.jpg', function(texture) {
            const geometry = new THREE.PlaneGeometry(16, 9);
            const material = new THREE.MeshBasicMaterial({ map: texture, depthTest: false });
            const plane = new THREE.Mesh(geometry, material);
            
            // Scale up to cover screen
            plane.scale.set(1.5, 1.5, 1);
            scene.add(plane);
            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                // Aggressive zoom and pan
                plane.scale.x += 0.0002;
                plane.scale.y += 0.0002;
                plane.position.x = Math.sin(Date.now() * 0.0002) * 0.5;
                renderer.render(scene, camera);
            }
            animate();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
